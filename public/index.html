<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,"><title>Kami BIM Editor</title><style>aside:last-child { border-left: 1px solid #2d3e68; border-right: 0; }
.stats { position: absolute; right: 14px; bottom: 14px; padding: 8px; background: #08101dcc; }
* { box-sizing: border-box; }
.primary { background: #7da2f3; color: #071226; font-weight: 700; }
.viewport { position: relative; }
body { margin: 0; height: 100vh; display: grid; grid-template-rows: 52px 1fr; font-family: Inter,system-ui; background: #09101c; color: #e7ecfa; }
.selected { border-color: #9fb9ff; background: #314a82; }
label { display: grid; gap: 4px; margin: 9px 0; }
h2 { font-size: 11px; margin-top: 20px; text-transform: uppercase; letter-spacing: .1em; color: #a7b9e0; }
button,input,select { width: 100%; margin: 5px 0; padding: 8px; background: #20315b; border: 1px solid #526fa9; border-radius: 5px; color: #e7ecfa; }
main { display: grid; grid-template-columns: 260px 1fr 300px; min-height: 0; }
header .spacer { flex: 1; }
#gpu-canvas { width: 100%; height: 100%; display: block; }
#gpu-status { position: absolute; left: 50%; top: 45%; transform: translate(-50%,-50%); color: #ffb0b0; }
header button,header select { width: auto; white-space: nowrap; }
aside { padding: 16px; overflow-y: auto; background: #111a34; border-right: 1px solid #2d3e68; }
header { padding: 0 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto; background: #121c38; }
button { cursor: pointer; text-align: left; }</style></head>
  <body>
    <header><strong>KAMI BIM EDITOR</strong><span>Semantic building workspace</span><span class="spacer"></span><select id="profile" aria-label="Interaction profile">
      <option value="revit">Revit</option>
      <option value="archicad">Archicad</option>
      <option value="vectorworks">Vectorworks</option>
    </select><button id="undo">Undo</button><button id="redo">Redo</button><button id="save-project">Save</button><button id="load-project">Load</button><button id="import">Import</button><input id="import-file" type="file" accept=".edn,.kami-bim.edn" style="display:none;"><button id="export">Export Project</button><button id="export-ifc">Export IFC</button><button id="import-ifc">Import IFC</button><input id="import-ifc-file" type="file" accept=".ifc" style="display:none;"><select id="drawing-kind" aria-label="Drawing kind">
      <option value="plan">Plan</option>
      <option value="section">Section</option>
      <option value="elevation">Elevation</option>
      <option value="sheet">Sheet</option>
    </select><select id="drawing-format" aria-label="Drawing format">
      <option value="svg">SVG</option>
      <option value="pdf">PDF</option>
      <option value="dxf">DXF</option>
    </select><button id="export-drawing">Export Drawing</button></header>
    <main>
      <aside>
        <h2>Elements</h2>
        <p id="profile-hint">WA Wall · DR Door · WN Window · LL Level · FL Floor</p>
        <button class="primary" id="add-wall">＋ Wall</button>
        <button id="add-slab">＋ Floor slab</button>
        <button id="add-door">＋ Door in selected wall</button>
        <button id="add-window">＋ Window in selected wall</button>
        <h2>Families</h2>
        <label>Definition<select id="family-definition">
          <option value="casework">Casework</option>
        </select></label>
        <label>Type<select id="family-type"></select></label>
        <label>Depth (m)<input id="family-depth" type="number" value="0.6"></label>
        <label>Height (m)<input id="family-height" type="number" value="0.9"></label>
        <button class="primary" id="add-family-instance">＋ Family instance</button>
        <h2>Engineering</h2>
        <label>Structural span (m)<input id="structural-span" type="number" value="6"></label>
        <label>Axial load (kN)<input id="structural-load" type="number" value="100"></label>
        <button id="analyze-structure">Analyze member</button>
        <label>Pipe start<input id="pipe-start" value="0,3,2.5"></label>
        <label>Pipe end<input id="pipe-end" value="8,3,2.5"></label>
        <label>Pipe diameter (m)<input id="pipe-diameter" type="number" value="0.1"></label>
        <button id="route-pipe">Route pipe</button>
        <div id="engineering-status">Ready</div>
        <h2>Rooms</h2>
        <label>Width (m)<input id="room-width" type="number" value="4"></label>
        <label>Depth (m)<input id="room-depth" type="number" value="3"></label>
        <button id="add-room">＋ Room</button>
        <div id="rooms"></div>
        <label>Room name<input id="room-name" value="Room"></label>
        <label>Use<select id="room-category"><option value="residential">residential</option><option value="office">office</option><option value="circulation">circulation</option><option value="service">service</option><option value="mechanical-room">mechanical-room</option><option value="other">other</option></select></label>
        <button id="apply-room">Apply room properties</button>
        <button id="delete-room">Delete room</button>
        <h2>Levels</h2>
        <button id="add-level">＋ Add level</button>
        <div id="levels"></div>
        <h2>Model tree</h2>
        <div id="tree"></div>
        <h2>Quantity schedule</h2>
        <button id="export-schedule">Export CSV</button>
        <div id="quantity-schedule"></div>
        <h2>Clash Detection</h2>
        <button class="primary" id="run-clashes">Run Clash Check</button>
        <button id="export-clashes">Export Clash CSV</button>
        <div id="clash-results">No clashes</div>
      </aside>
      <section class="viewport">
        <canvas id="gpu-canvas" aria-label="BIM WebGPU viewport"></canvas>
        <div id="gpu-status">Initializing WebGPU…</div>
        <div class="stats" id="stats">Loading model…</div>
      </section>
      <aside>
        <h2 id="inspector-title">Selected element</h2>
        <label>Name<input id="name"></label>
        <label>Length (m)<input id="length" type="number" step="0.1"></label>
        <label>Height (m)<input id="height" type="number" step="0.1"></label>
        <label>Thickness (m)<input id="thickness" type="number" step="0.05"></label>
        <label>Material<input id="material"></label>
        <button class="primary" id="apply">Apply properties</button>
        <button id="delete">Delete element</button>
      </aside>
    </main>
    <span id="debug-state" style="display:none;"></span>
    <script src="./js/app.js"></script>
  </body>
</html>
