<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,"><title>Kami BIM Editor</title><style>aside:last-child { border-left: 1px solid #2d3e68; border-right: 0; }
.stats { position: absolute; right: 14px; bottom: 14px; padding: 8px; background: #08101dcc; }
* { box-sizing: border-box; }
.primary { background: #7da2f3; color: #071226; font-weight: 700; }
.viewport { position: relative; }
body { margin: 0; height: 100vh; display: grid; grid-template-rows: 52px 1fr; font-family: Inter,system-ui; background: #09101c; color: #e7ecfa; }
.selected { border-color: #9fb9ff; background: #314a82; }
label { display: grid; gap: 4px; margin: 9px 0; }
button,input { width: 100%; margin: 5px 0; padding: 8px; background: #20315b; border: 1px solid #526fa9; border-radius: 5px; color: #e7ecfa; }
h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: #a7b9e0; }
main { display: grid; grid-template-columns: 240px 1fr 280px; min-height: 0; }
header .spacer { flex: 1; }
#gpu-canvas { width: 100%; height: 100%; display: block; }
#gpu-status { position: absolute; left: 50%; top: 45%; transform: translate(-50%,-50%); color: #ffb0b0; }
aside { padding: 16px; background: #111a34; border-right: 1px solid #2d3e68; }
header { padding: 0 16px; display: flex; align-items: center; gap: 18px; background: #121c38; }
button { cursor: pointer; text-align: left; } :focus-visible { outline: 3px solid #ffd166; outline-offset: 2px; }</style></head>
  <body>
    <header>
      <strong>KAMI BIM EDITOR</strong>
      <a href="https://kotoba-lang.github.io/kami-studio/">Studio</a>
      <span>Semantic building workspace</span>
      <span class="spacer"></span>
      <select id="profile" aria-label="Interaction profile">
        <option value="revit">Revit</option>
        <option value="archicad">Archicad</option>
        <option value="vectorworks">Vectorworks</option>
      </select>
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="save-project">Save</button>
      <button id="load-project">Load</button>
      <button id="import">Import</button>
      <input id="import-file" aria-label="Import BIM project file" type="file" accept=".edn,.kami-bim.edn" style="display:none;">
      <button id="export">Export Project</button>
    </header>
    <main>
      <aside>
        <h2>Elements</h2>
        <p id="profile-hint">WA Wall · DR Door · WN Window · LL Level · FL Floor</p>
        <button class="primary" id="add-wall">＋ Wall</button>
        <button id="add-slab">＋ Floor slab</button>
        <button id="add-door">＋ Door in selected wall</button>
        <button id="add-window">＋ Window in selected wall</button>
        <h2>Levels</h2>
        <button id="add-level">＋ Add level</button>
        <div id="levels"></div>
        <h2>Model tree</h2>
        <div id="tree"></div>
        <h2>Quantity schedule</h2>
        <button id="export-schedule">Export CSV</button>
        <div id="quantity-schedule"></div>
      </aside>
      <section class="viewport">
        <canvas id="gpu-canvas" aria-label="BIM WebGPU viewport"></canvas>
        <div id="gpu-status">Initializing WebGPU…</div>
        <div class="stats" id="stats">1 storey · 4 semantic walls</div>
      </section>
      <aside>
        <h2 id="inspector-title">Selected wall</h2>
        <label>Name<input id="name" value="Exterior Wall"></label>
        <label>Length (m)<input id="length" type="number" step="0.1" value="8.4"></label>
        <label>Height (m)<input id="height" type="number" step="0.1" value="3.2"></label>
        <label>Thickness (m)<input id="thickness" type="number" step="0.05" value="0.25"></label>
        <label>Material<input id="material" value="Reinforced concrete"></label>
        <button class="primary" id="apply">Apply properties</button>
        <button id="delete">Delete element</button>
      </aside>
    </main>
    <span id="debug-state" style="display:none;"></span>
    <script src="./js/app.js"></script>
  </body>
</html>
